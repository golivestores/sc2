<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>sc2 — 网页镜像导航</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0e0f13;
    --card: #181a21;
    --card-hover: #1f222b;
    --border: #2a2d38;
    --fg: #e8e9ee;
    --fg-dim: #8a8f9c;
    --accent: #7aa2f7;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
               font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif; }
  header { padding: 40px 48px 24px; border-bottom: 1px solid var(--border); }
  header h1 { margin: 0 0 6px; font-size: 22px; letter-spacing: 0.5px; }
  header p  { margin: 0; color: var(--fg-dim); font-size: 13px; }

  main { padding: 28px 48px 80px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform .15s ease, border-color .15s ease, box-shadow .15s ease;
  }
  .card:hover { border-color: #3a3f4e; transform: translateY(-2px);
                box-shadow: 0 8px 24px rgba(0,0,0,.35); }

  /* iframe preview — scaled down so the whole homepage fits in the card */
  .preview {
    position: relative;
    aspect-ratio: 16 / 10;
    overflow: hidden;
    background: #0a0b0f;
    border-bottom: 1px solid var(--border);
  }
  .preview iframe {
    position: absolute; top: 0; left: 0;
    width: 400%; height: 400%;
    border: 0;
    transform: scale(0.25);
    transform-origin: top left;
    /* iframe is interactive — scroll/hover/click work within. Card body + ↗ open in new tab. */
  }
  .preview__open {
    position: absolute; top: 10px; right: 10px;
    width: 30px; height: 30px;
    z-index: 2;
    display: flex; align-items: center; justify-content: center;
    background: rgba(20, 22, 30, .9); border: 1px solid var(--border); border-radius: 8px;
    color: var(--fg); text-decoration: none;
    font-size: 14px; font-weight: 600;
    opacity: 0; transition: opacity .15s, background .15s;
  }
  .card:hover .preview__open { opacity: 1; }
  .preview__open:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  .body  { padding: 14px 18px 16px;
           display: flex; flex-direction: column; gap: 6px;
           text-decoration: none; color: inherit; }
  .num   { font-size: 11px; color: var(--fg-dim); font-family: ui-monospace, Consolas, monospace;
           letter-spacing: .08em; }
  .title { font-size: 15px; font-weight: 600; margin: 0; line-height: 1.3; }
  .meta  { display: flex; justify-content: space-between; align-items: center;
           font-size: 11.5px; color: var(--fg-dim); margin-top: 6px; padding-top: 10px;
           border-top: 1px solid var(--border); }
  .src   { color: var(--accent); text-decoration: none; }
  .src:hover { text-decoration: underline; }

  .empty {
    color: var(--fg-dim); font-size: 13px; line-height: 1.7;
    padding: 60px 28px; text-align: center;
    border: 1px dashed var(--border); border-radius: 12px;
  }
  .empty code { background: #262a36; padding: 2px 8px; border-radius: 4px; color: var(--fg);
                font-family: ui-monospace, Consolas, monospace; font-size: 12.5px; }
</style>
</head>
<body>
<header>
  <h1>sc2 · 网页镜像导航</h1>
  <p id="status">正在扫描镜像目录 …</p>
</header>

<main>
  <div id="grid" class="grid"></div>
</main>

<!-- designs.js is generated by rebuild-index.py (called by finalize.py);
     exposes window.__DESIGNS__. Loaded via <script src> so the navigator also
     works under file:// — same pattern as effects/effects.js. -->
<script src="designs.js"></script>

<script>
const grid = document.getElementById('grid');
const statusEl = document.getElementById('status');

const esc = s => String(s ?? '').replace(/[&<>"']/g, c =>
  ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

function showEmpty(html) {
  grid.innerHTML = `<div class="empty" style="grid-column:1/-1">${html}</div>`;
  statusEl.textContent = '';
}

function card(d) {
  const num = (d.folder.match(/^(\d+)/) || [, ''])[1];
  const href = d.href || `${esc(d.folder)}/index.html`;
  const src = d.sourceUrl
    ? `<a class="src" href="${esc(d.sourceUrl)}" target="_blank" rel="noreferrer"
          onclick="event.stopPropagation()">原站 ↗</a>`
    : '<span></span>';
  return `
    <div class="card">
      <div class="preview">
        <iframe src="${esc(href)}" loading="lazy" title="${esc(d.title || d.folder)}"></iframe>
        <a class="preview__open" href="${esc(href)}" target="_blank" rel="noreferrer" title="新标签打开">↗</a>
      </div>
      <a class="body" href="${esc(href)}" target="_blank" rel="noreferrer">
        <span class="num">${esc(num)}</span>
        <h3 class="title">${esc(d.title || d.folder)}</h3>
        <div class="meta">
          <span>${esc(d.savedAt || '')}</span>
          ${src}
        </div>
      </a>
    </div>`;
}

(function () {
  const data = window.__DESIGNS__;
  if (!Array.isArray(data)) {
    showEmpty(
      '<b>读取镜像索引失败。</b><br><br>' +
      '本页期望同目录下有 <code>designs.js</code>（由 <code>python finalize.py</code> 生成）。<br>' +
      '请在 sc2 根目录跑一次 <code>python finalize.py</code>（或 <code>--skip-package --skip-overlay</code> 只重建索引），然后刷新本页。'
    );
    return;
  }
  if (!data.length) {
    showEmpty(
      '<b>designs/ 里还没有任何子文件夹。</b><br><br>' +
      '用 <code>python scrape-url.py &lt;URL&gt; &lt;序号-名字&gt;</code> 抓一个页面，<br>' +
      '然后跑 <code>python rebuild-index.py</code> 刷新索引。'
    );
    return;
  }
  const items = data.slice().sort((a, b) =>
    String(a.folder).localeCompare(String(b.folder))
  );
  statusEl.textContent = `共 ${items.length} 个镜像 · 点击卡片在新标签打开`;
  grid.innerHTML = items.map(card).join('');
})();
</script>
</body>
</html>
