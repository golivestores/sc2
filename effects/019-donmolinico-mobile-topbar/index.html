<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Don Molinico — mobile top bar</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  /* === sc2 effect 19 · 1:1 of donmolinico.es mobile persistent top bar ===
       - .intro overlay covers viewport on load; the gold logo (multi-group SVG)
         fades in centered, then the red .intro__bg and the logo shrink/translate
         into the final top-center "tab bar" position (.menu-label + .menu-label__bg).
       - Hamburger button tilts its two lines into a slight-X via .is-menu-open on body.
       - Full-screen red overlay (#menu) slides in with menu items; each item's
         windmill .icon-molinico scales 0→1 with stagger when the item enters view.
       - Source: scoped CSS captured from live donmolinico.es (Vue/Nuxt v2 site).  */

  @font-face {
    font-family: "super-med";
    font-style: normal;
    font-display: swap;
    src: url("assets/fonts/super-med.woff2") format("woff2"),
         url("assets/fonts/super-med.woff")  format("woff");
  }

  /* Root font-size 90% to match the original site's rem→px mapping. */
  html { font-size: 90%; }

  :root {
    --c-bg:        #fbf5e7;
    --c-accent:    #d70321;  /* brand red */
    --c-secondary: #cba058;  /* brand gold */
    --c-text-alt:  #fbf5e7;
    --offset:      1.8rem;
    --gutter:      1.8rem;
    --ease-expo:   cubic-bezier(0.19, 1, 0.22, 1);
    --ease-power:  cubic-bezier(1, 0, 0, 1);

    /* Bar has two states:
         - resting (collapsed):  narrow strip showing only the M monogram
         - hover (expanded):     full DESDE 1987 / DON MOLINICO / NUEVA TRADICION

       Live measurements at scrolled-collapsed state:
         viewport 390  -> bar 60x114   ham 25w
       Live measurements at expanded (top-of-page) state:
         viewport 390  -> bar 240x143  ham 60w
         viewport 768  -> bar 240x162
         viewport 1440 -> bar 346x192  */
    --bar-w:           max(240px, 24vw);
    --bar-h:           calc(124px + 4.7vw);
    --bar-w-collapsed: max(60px, 6vw);
    --bar-h-collapsed: calc(99px + 3.75vw);
    --ham-w:           max(60px, 6vw);
    --ham-w-collapsed: calc(var(--ham-w) * 0.42);
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--c-bg);
    color: #2a1d12;
    font-family: "super-med", Helvetica, sans-serif;
    text-transform: uppercase;
    /* tall page so user can actually scroll to test the collapse trigger */
    min-height: 280vh;
    overflow-x: hidden;
    position: relative;
  }
  .scroll-hint {
    position: absolute;
    top: 50vh;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(42, 29, 18, 0.55);
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    pointer-events: none;
    text-align: center;
  }
  .scroll-hint::after {
    content: "↓";
    display: block;
    margin-top: 0.5rem;
    font-size: 1.4rem;
    animation: hint-bob 1.6s ease-in-out infinite;
  }
  @keyframes hint-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }

  /* faint hero plate so the floating red bar has visible context (not from live site,
     just so the demo isn't pure cream) */
  .stage {
    position: fixed;
    inset: 0;
    background: var(--c-bg);
    z-index: 0;
  }
  .stage::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 18% 32%, #f1d6a8 0 8%, transparent 9%),
      radial-gradient(circle at 78% 22%, #efc7a1 0 7%, transparent 8%),
      radial-gradient(circle at 64% 78%, #d9986b 0 10%, transparent 11%),
      radial-gradient(circle at 24% 76%, #c8804b 0 9%, transparent 10%),
      radial-gradient(circle at 88% 60%, #e4c098 0 6%, transparent 7%);
    opacity: 0.55;
    filter: blur(8px);
  }

  /* ===== .menu-label — the persistent top bar =====
     Two states: resting (small monogram strip) and hover-expanded (full logo).
     The outer .menu-label keeps a constant hit-area but its visible parts
     (.menu-label__bg, hamburger width, logo group) animate between sizes. */
  .menu-label {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    /* Default = expanded (page at top of scroll). */
    width: var(--bar-w);
    height: var(--bar-h);
    z-index: 20;
    transition: width 0.6s var(--ease-expo), height 0.6s var(--ease-expo);
    will-change: width, height;
  }
  /* Scrolled past threshold → collapsed. Three things bring it back to
     expanded: scroll back to top, mouse-enter the bar (is-bar-hovered, set
     in JS so scroll can clear it even if the cursor lingers), or open the
     menu. CSS :hover would stick to the cursor's current position and the
     bar would never collapse while a wheel-scroll happened directly over
     it — so we use a JS-driven class instead. */
  body.is-scrolled .menu-label {
    width: var(--bar-w-collapsed);
    height: var(--bar-h-collapsed);
  }
  body.is-scrolled.is-bar-hovered .menu-label,
  body.is-menu-open .menu-label {
    width: var(--bar-w);
    height: var(--bar-h);
  }
  .menu-label__bg {
    background: var(--c-accent);
    height: 100%;
    width: 100%;
    position: absolute;
    inset: 0;
    z-index: 5;
  }
  .menu-label__inner {
    align-items: center;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: max(2rem, min(2.6vw, 3rem));
    justify-content: space-between;
    position: relative;
    z-index: 10;
    height: 100%;
    padding: clamp(1rem, 3.6vw, 1.5rem) 0;
  }
  .menu-label__hamburger {
    appearance: none;
    background: none;
    border: 0;
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding: 0;
    transition: width 0.6s var(--ease-expo), transform 0.75s var(--ease-expo);
    width: var(--ham-w);
    z-index: 10;
    cursor: pointer;
  }
  @media (min-width: 960px) {
    .menu-label__hamburger { gap: 1rem; }
  }
  body.is-scrolled .menu-label__hamburger { width: var(--ham-w-collapsed); }
  body.is-scrolled.is-bar-hovered .menu-label__hamburger,
  body.is-menu-open .menu-label__hamburger { width: var(--ham-w); }
  .menu-label__hamburger:hover { transform: scaleX(0.8); }
  .menu-label__line {
    background: var(--c-secondary);
    display: flex;
    height: 2px;
    position: relative;
    transform-origin: center center;
    transition: transform 1s var(--ease-expo);
    width: 100%;
  }
  /* hamburger → slight X when menu is open (mobile) */
  body.is-menu-open .menu-label__line:first-child {
    transform: translate3d(0, 0.35rem, 0) rotate(-8deg);
  }
  body.is-menu-open .menu-label__line:last-child {
    transform: translate3d(0, -0.35rem, 0) rotate(8deg);
  }
  @media (min-width: 960px) {
    body.is-menu-open .menu-label__line:first-child {
      transform: translate3d(0, 0.6rem, 0) rotate(-8deg);
    }
    body.is-menu-open .menu-label__line:last-child {
      transform: translate3d(0, -0.6rem, 0) rotate(8deg);
    }
  }

  .menu-label__logos {
    display: grid;
    grid-template-columns: 100%;
    grid-template-rows: 100%;
    position: relative;
    z-index: 5;
    color: var(--c-secondary);
    text-decoration: none;
    width: 100%;
    padding: 0 max(0.5rem, 2vw);
    place-items: center;
  }
  /* Both SVGs occupy the same grid cell so they overlay. Only one is
     visible at a time (opacity-based cross-fade). */
  .menu-label__logos > svg {
    display: block;
    color: var(--c-secondary);
    grid-area: 1 / 1;
    transition: opacity 0.35s var(--ease-expo);
  }
  .logo-mono {
    width: clamp(28px, 14vw, 60px);
    height: auto;
    opacity: 0;
    pointer-events: none;
  }
  .logo-morphing {
    width: 100%;
    height: auto;
    opacity: 1;
  }
  /* During intro, hide the bar's own logo until the big intro-logo has
     translated up to land in the bar's position — then cross-fade in. */
  .menu-label.is-entering .logo-morphing {
    opacity: 0;
    animation: bar-logo-in 1800ms var(--ease-expo) forwards;
  }
  @keyframes bar-logo-in {
    0%, 65% { opacity: 0; }
    100%    { opacity: 1; }
  }
  /* Scrolled state: swap full logo → small M monogram. */
  body.is-scrolled .logo-morphing { opacity: 0; transition-delay: 0s; }
  body.is-scrolled .logo-mono      { opacity: 1; transition-delay: 0.25s; }
  /* Hover-while-scrolled or menu-open both bring the full logo back. */
  body.is-scrolled.is-bar-hovered .logo-morphing,
  body.is-menu-open .logo-morphing { opacity: 1; transition-delay: 0.25s; }
  body.is-scrolled.is-bar-hovered .logo-mono,
  body.is-menu-open .logo-mono     { opacity: 0; transition-delay: 0s; }
  /* Per-group staggered fade for the "text animates out" effect during the
     expanded→collapsed transition. desde + nueva-tradicion fade first (side
     labels), then DON, then MOLINICO. */
  .logo-morphing > g {
    opacity: 1;
    transition: opacity 0.35s var(--ease-expo);
  }
  body.is-scrolled .logo-morphing > g { opacity: 0; }
  body.is-scrolled .logo-morphing > #desde            { transition-delay: 0s;   }
  body.is-scrolled .logo-morphing > #nueva-tradicion  { transition-delay: 60ms; }
  body.is-scrolled .logo-morphing > #don              { transition-delay: 120ms;}
  body.is-scrolled .logo-morphing > #molinico         { transition-delay: 180ms;}
  body.is-scrolled .logo-morphing > #monogram-small   { transition-delay: 240ms;}
  /* Hover-while-scrolled / menu-open: bring the groups back. Without this,
     the wrapper opacity is 1 but its children stay at 0 → empty red box. */
  body.is-scrolled.is-bar-hovered .logo-morphing > g,
  body.is-menu-open .logo-morphing > g { opacity: 1; }
  body.is-scrolled.is-bar-hovered .logo-morphing > #desde,
  body.is-menu-open .logo-morphing > #desde           { transition-delay: 280ms; }
  body.is-scrolled.is-bar-hovered .logo-morphing > #nueva-tradicion,
  body.is-menu-open .logo-morphing > #nueva-tradicion { transition-delay: 340ms; }
  body.is-scrolled.is-bar-hovered .logo-morphing > #don,
  body.is-menu-open .logo-morphing > #don             { transition-delay: 380ms; }
  body.is-scrolled.is-bar-hovered .logo-morphing > #molinico,
  body.is-menu-open .logo-morphing > #molinico        { transition-delay: 420ms; }
  body.is-scrolled.is-bar-hovered .logo-morphing > #monogram-small,
  body.is-menu-open .logo-morphing > #monogram-small  { transition-delay: 460ms; }
  .logo-morphing path,
  .logo-mono path { fill: currentColor; }

  /* ===== Intro animation =====
     A separate .intro-curtain (position: fixed, 100vw×100vh red) covers the
     viewport on load and then collapses down to nothing — revealing the
     already-positioned .menu-label underneath. The full logo flashes in at
     center, then fades out as the mono fades in. */
  .intro-curtain {
    position: fixed;
    inset: 0;
    background: var(--c-accent);
    /* must sit BELOW .menu-label so the intro-scaled logo (rendered inside
       .menu-label, z-index 20) paints on top of the curtain. */
    z-index: 15;
    pointer-events: none;
    transform-origin: 50% 0%;
    animation: curtain-out 1800ms var(--ease-expo) forwards;
  }
  @keyframes curtain-out {
    0%   { transform: scale(1, 1);                                                                       opacity: 1; }
    35%  { transform: scale(1, 1);                                                                       opacity: 1; }
    /* Shrinks down to the EXPANDED bar size at top-center, then fades out
       so the bar (already painted underneath) seamlessly takes over. */
    100% { transform: scale(calc(var(--bar-w) / 100vw), calc(var(--bar-h) / 100vh));                     opacity: 0; visibility: hidden; }
  }
  /* Dedicated fixed-position big logo for the intro phase. Decoupled from the
     bar so it can be max(280px, 30vw) wide at viewport center, matching the
     original site's .intro__logo { width: max(30rem, min(30vw, 60rem)) }. */
  .intro-logo {
    position: fixed;
    top: 50%;
    left: 50%;
    width: max(280px, min(30vw, 600px));
    height: auto;
    z-index: 20;
    color: var(--c-secondary);
    pointer-events: none;
    opacity: 0;
    transform: translate(-50%, -50%);
    animation: intro-logo-fade 1800ms var(--ease-expo) forwards;
  }
  .intro-logo svg { width: 100%; height: auto; display: block; }
  .intro-logo path { fill: currentColor; }
  @keyframes intro-logo-fade {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(1); }
    18%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    55%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    /* end: shrink + translate upward so the logo lands at the bar's logo
       y-position (~half bar height from viewport top). Bar's own
       .logo-morphing fades to visible during the last ~200ms via its own
       transition, so the cross-fade reads as a continuous shrink-up. */
    100% { opacity: 0; transform: translate(-50%, calc(-50vh + var(--bar-h) / 2)) scale(0.55); }
  }
  .menu-label.is-entering .menu-label__inner { pointer-events: none; }
  .menu-label.is-entering .menu-label__hamburger {
    opacity: 0;
    animation: ham-in 500ms ease-out forwards;
    animation-delay: 1500ms;
  }
  @keyframes ham-in { to { opacity: 1; } }

  /* ===== full-screen menu overlay (aside#menu) ===== */
  .menu {
    align-items: center;
    background: var(--c-accent);
    color: var(--c-secondary);
    display: flex;
    flex-direction: column;
    height: 100vh;
    justify-content: flex-end;
    left: 0;
    padding: clamp(6rem, 16vh, 12rem) 0;
    pointer-events: none;
    position: fixed;
    top: 0;
    width: 100vw;
    z-index: 19; /* below .menu-label (20) so hamburger stays clickable */
    clip-path: inset(0 0 100% 0);
    transition: clip-path 0.9s var(--ease-expo), opacity 0.4s ease;
    opacity: 0;
  }
  body.is-menu-open .menu {
    clip-path: inset(0 0 0 0);
    opacity: 1;
    pointer-events: all;
  }
  .menu__list {
    list-style: none;
    margin: 0;
    padding: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .menu__item {
    align-items: center;
    border-bottom: 1px solid var(--c-secondary);
    display: flex;
    gap: var(--gutter);
    justify-content: center;
    padding: 1.6rem 0;
    width: 100%;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
  }
  .menu__item:first-child { border-top: 1px solid var(--c-secondary); }
  .menu__item a {
    color: var(--c-secondary);
    text-decoration: none;
    display: inline-block;
    position: relative;
  }
  .icon-molinico {
    width: max(1.4rem, min(2.2vw, 2.2rem));
    height: auto;
    transform: scale(0);
    transition: transform 1s cubic-bezier(0.165, 0.84, 0.44, 1);
    will-change: transform;
    color: var(--c-secondary);
  }
  .icon-molinico:first-child { transform: rotate(-90deg) scale(0); }
  .icon-molinico:last-child  { transform: rotate(90deg)  scale(0); }
  body.is-menu-open .menu__item .icon-molinico {
    transform: scale(1);
    transition-delay: calc(0.45s + var(--i) * 80ms);
  }
  body.is-menu-open .menu__item .icon-molinico:first-child {
    transform: rotate(-90deg) scale(1);
  }
  body.is-menu-open .menu__item .icon-molinico:last-child {
    transform: rotate(90deg) scale(1);
  }
  /* only the active item shows its rotating windmill markers — others stay scale-0;
     here we keep them visible to mirror the hover/animation but hide neighbors of
     non-active items per live behavior */
  .menu__item:not(.is-active) > .icon-molinico:not(.menu__item__active-shown) {
    display: none;
  }
  .menu__item.is-active > .icon-molinico { display: block; }

  /* ===== replay button (effect demo only) ===== */
  .replay {
    appearance: none;
    border: 1px solid var(--c-secondary);
    background: transparent;
    color: var(--c-secondary);
    font: 600 0.85rem/1 "super-med", Helvetica, sans-serif;
    letter-spacing: 0.12em;
    padding: 0.7rem 1.2rem;
    position: fixed;
    bottom: 1.6rem;
    left: 50%;
    transform: translateX(-50%);
    cursor: pointer;
    text-transform: uppercase;
    z-index: 50;
  }
  .replay:hover { background: var(--c-secondary); color: var(--c-accent); }

  .credit {
    position: fixed;
    bottom: 1.6rem;
    left: 1.4rem;
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    color: rgba(42, 29, 18, 0.5);
    z-index: 50;
  }
</style>
</head>
<body>

<div class="stage"></div>
<div class="intro-curtain" aria-hidden="true"></div>
<div class="intro-logo" aria-hidden="true">

<script>
  const bar = document.querySelector('.menu-label');
  const curtain = document.querySelector('.intro-curtain');
  const introLogo = document.querySelector('.intro-logo');
  const burger = document.querySelector('.menu-label__hamburger');
  const replay = document.querySelector('.replay');
  const menu = document.getElementById('menu');

  // strip .is-entering after the curtain finishes so re-render doesn't replay
  curtain.addEventListener('animationend', () => {
    bar.classList.remove('is-entering');
    curtain.style.display = 'none';
  });

  // scroll-trigger: collapse when past threshold, expand at top. Scroll also
  // clears .is-bar-hovered so a wheel-scroll over the bar still collapses it
  // even if the cursor is stationary on top of it.
  const SCROLL_THRESHOLD = 60;
  let lastScrolled = false;
  let lastScrollTs = 0;
  function checkScroll() {
    const scrolled = window.scrollY > SCROLL_THRESHOLD;
    if (scrolled !== lastScrolled) {
      document.body.classList.toggle('is-scrolled', scrolled);
      lastScrolled = scrolled;
    }
    document.body.classList.remove('is-bar-hovered');
    lastScrollTs = Date.now();
  }
  window.addEventListener('scroll', checkScroll, { passive: true });
  checkScroll();

  // JS-driven hover state: mouseenter/leave instead of CSS :hover, plus a
  // mousemove re-trigger so the cursor sitting on the bar can re-engage after
  // a scroll cleared the hover class (200ms cooldown to avoid scroll-induced
  // mousemove events flipping it right back on).
  bar.addEventListener('mouseenter', () => {
    document.body.classList.add('is-bar-hovered');
  });
  bar.addEventListener('mouseleave', () => {
    document.body.classList.remove('is-bar-hovered');
  });
  bar.addEventListener('mousemove', () => {
    if (Date.now() - lastScrollTs > 200) {
      document.body.classList.add('is-bar-hovered');
    }
  });

  // hamburger toggles menu overlay
  burger.addEventListener('click', () => {
    document.body.classList.toggle('is-menu-open');
    menu.setAttribute('aria-hidden', document.body.classList.contains('is-menu-open') ? 'false' : 'true');
  });

  // tap outside the bar inside the open menu also closes
  menu.addEventListener('click', (e) => {
    if (e.target.closest('a')) {
      e.preventDefault();
      document.body.classList.remove('is-menu-open');
      menu.setAttribute('aria-hidden', 'true');
    }
  });

  // replay intro button — reset every animated element so all 3 keyframe
  // tracks (bar logos, curtain, big intro-logo) restart in sync.
  function restartAnim(el) {
    el.style.animation = 'none';
    void el.offsetWidth;  // force reflow
    el.style.animation = '';
  }
  replay.addEventListener('click', () => {
    document.body.classList.remove('is-menu-open');
    bar.classList.remove('is-entering');
    curtain.style.display = '';
    void bar.offsetWidth;
    bar.classList.add('is-entering');
    restartAnim(curtain);
    restartAnim(introLogo);
  });
</script>
