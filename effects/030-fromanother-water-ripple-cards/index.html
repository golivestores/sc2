<title>fromanother · Featured Work · water-ripple cards · sc2 effect</title>

<!--
  1:1 reproduction of the "Featured Work" centerpiece on https://www.fromanother.love/.
  Six project covers stacked in the center; the title overlays the image (image
  in front, text behind — image z-index 2, text z-index 1); scrolling the mouse
  wheel advances to the next slide with a circular ripple cross-fade.

  Two shaders verbatim from page-0367d57ab8704bfa.js:

  1. SIM PASS (64×64 ping-pong RT, RGBA-Half)
     velocity += (laplacian_of_neighbors − height) * 0.5
     velocity *= dissipation; height += velocity
     mouseBrush = smoothstep(uBrushRadius, 0, distance(uv, uMouse)) * uVelocity
     height += mouseBrush;  height *= 0.98;  velocity *= 0.98

  2. DISPLAY PASS
     mouseNormalOffset = central-diff of height map = (hL−hR, hT−hB)
     waveProgress      = smoothstep(0,1,uProgress)
     rippleRadius      = waveProgress
     waveIntensity     = smoothstep(0,.2,uProgress) * smoothstep(1,.6,uProgress)
     wavePattern       = sin((dist−rippleRadius) * 8) * waveIntensity * 0.15
     waveNormalOffset  = normalize(uv−center) * wavePattern
     distortion        = (mouseNormalOffset + waveNormalOffset) * uDistortionStrength
     mask              = smoothstep(rippleRadius−.15, rippleRadius, dist)
     mask              = mix(mask, mask*(1 − sin((dist−rippleRadius)*6)*.175), waveIntensity)
     finalColor        = mix(texNext, texCurrent, mask)
     finalColor.rgb   *= clamp(1 − length(totalNormal)*.6, .6, 1)

  Layout matches the live site: top bar (Menu / fromanother / Let's chat),
  left rail (1..6 italic index numbers, "Featured work" label + dash on
  active), centered 16:9 image overlapping a large left-aligned H2 (image
  in front, title behind), right column with services, footer with
  VIEW ALL PROJECTS, plus the cookie banner. 6 local Mux thumbnails
  stand in for the Prismic covers (kept self-hosted).
-->

<script type="module">
import * as THREE from 'three';

/* ---------- project metadata (extracted from RSC payload of the live home) ---------- */
const PROJECTS = [
  { name: 'Powered to Play\nAll Day',                services: ['Creative Direction','Art Direction','CGI Production','Production'], src: 'assets/cover-1.jpg' },
  { name: 'The Eternal\nHorse x Marina\nIFC',         services: ['Visual Direction','Visual Production','On-site supervise'],         src: 'assets/cover-2.jpg' },
  { name: 'Year of the\nRabbit',                      services: ['Art Direction','Concept CGI Art','Direction','Production'],         src: 'assets/cover-3.jpg' },
  { name: 'Louis Vuitton\nSeries',                    services: ['Photography','Art Direction','Production'],                          src: 'assets/cover-4.jpg' },
  { name: 'Oriens\nLumina Walks',                     services: ['Experiental','Motion Design','On-set Production'],                   src: 'assets/cover-5.jpg' },
  { name: 'Perfection\nat Play',                      services: ['Art Direction','Creative Direction','CGI Art','Management','Production'], src: 'assets/cover-6.jpg' },
];

const TRANSITION_DUR = 1.2;

/* ---------- rail (1..6) ---------- */
const rail = document.getElementById('rail');
PROJECTS.forEach((p, i) => {
  const b = document.createElement('button');
  b.innerHTML = `<span class="num">${i+1}</span><span class="dash"></span><span></span><span class="label">Featured work</span>`;
  b.onclick = () => goTo(i);
  rail.appendChild(b);
});
const railBtns = [...rail.querySelectorAll('button')];

/* ---------- thumb rail (right edge): 6 small project images + moving dash indicator ---------- */
const thumbsEl = document.getElementById('thumbs');
PROJECTS.forEach((p, i) => {
  const tb = document.createElement('button');
  tb.innerHTML = `<img src="${p.src}" alt="">`;
  tb.onclick = () => goTo(i);
  thumbsEl.appendChild(tb);
});
const thumbIndicator = document.createElement('div');
thumbIndicator.className = 'thumb-indicator';
thumbsEl.appendChild(thumbIndicator);
const thumbBtns = [...thumbsEl.querySelectorAll('button')];

function moveThumbIndicator(i) {
  const tb = thumbBtns[i];
  if (!tb) return;
  const tbRect = tb.getBoundingClientRect();
  const railRect = thumbsEl.getBoundingClientRect();
  thumbIndicator.style.top = (tbRect.top - railRect.top + tbRect.height/2) + 'px';
}
window.addEventListener('resize', () => moveThumbIndicator(currentIdx));

/* ---------- three.js scene ---------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: true, premultipliedAlpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-0.5, 0.5, 0.5, -0.5, 0, 10);
camera.position.z = 1;

const geo = new THREE.PlaneGeometry(1, 1);

/* ---------- sim RT pair ---------- */
const RT_OPTS = {
  type: THREE.HalfFloatType,
  format: THREE.RGBAFormat,
  minFilter: THREE.LinearFilter,
  magFilter: THREE.LinearFilter,
  wrapS: THREE.ClampToEdgeWrapping,
  wrapT: THREE.ClampToEdgeWrapping,
  depthBuffer: false,
  stencilBuffer: false,
};
let rtA = new THREE.WebGLRenderTarget(64, 64, RT_OPTS);
let rtB = new THREE.WebGLRenderTarget(64, 64, RT_OPTS);

/* ---------- SIM shader (verbatim) ---------- */
const simMat = new THREE.ShaderMaterial({
  uniforms: {
    uTexture:     { value: null },
    uMouse:       { value: new THREE.Vector2(0.5, 0.5) },
    uDissipation: { value: 0.985 },
    uBrushRadius: { value: 0.14 },
    uVelocity:    { value: 0.0 },
  },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    uniform sampler2D uTexture;
    uniform vec2  uMouse;
    uniform float uDissipation;
    uniform float uBrushRadius;
    uniform float uVelocity;
    varying vec2 vUv;

    void main() {
      vec2 texelSize = vec2(1.0 / 64.0);
      vec2 current = texture2D(uTexture, vUv).xy;

      float left   = texture2D(uTexture, vUv + vec2(-texelSize.x, 0.0)).r;
      float right  = texture2D(uTexture, vUv + vec2( texelSize.x, 0.0)).r;
      float top    = texture2D(uTexture, vUv + vec2(0.0, -texelSize.y)).r;
      float bottom = texture2D(uTexture, vUv + vec2(0.0,  texelSize.y)).r;

      float average = (left + right + top + bottom) * 0.25;
      current.y += (average - current.r) * 0.5;
      current.y *= uDissipation;
      current.r += current.y;

      float distMouse  = distance(vUv, uMouse);
      float brushMouse = smoothstep(uBrushRadius, 0.0, distMouse);
      current.r += brushMouse * uVelocity;

      current.r *= 0.98;
      current.y *= 0.98;

      gl_FragColor = vec4(clamp(current.r, -5.0, 5.0),
                          clamp(current.y, -5.0, 5.0), 0.0, 1.0);
    }
  `,
});
const simScene = new THREE.Scene();
const simCam   = new THREE.OrthographicCamera(-0.5, 0.5, 0.5, -0.5, 0, 10);
simCam.position.z = 1;
simScene.add(new THREE.Mesh(geo, simMat));

/* ---------- DISPLAY shader (verbatim) ---------- */
const dispMat = new THREE.ShaderMaterial({
  transparent: true,
  uniforms: {
    uTexture:            { value: null },
    uTextureNext:        { value: null },
    uDisplacementMap:    { value: null },
    uDistortionStrength: { value: 0.65 },
    uProgress:           { value: 0.0 },
    uOpacity:            { value: 1.0 },
    uMeshSize:           { value: new THREE.Vector2(1, 1) },
    uImageSize:          { value: new THREE.Vector2(1, 1) },
  },
  vertexShader: /* glsl */`
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: /* glsl */`
    uniform sampler2D uTexture;
    uniform sampler2D uTextureNext;
    uniform sampler2D uDisplacementMap;
    uniform float uDistortionStrength;
    uniform float uProgress;
    uniform float uOpacity;
    uniform vec2  uMeshSize;
    uniform vec2  uImageSize;
    varying vec2  vUv;

    vec2 backgroundCoverUv(vec2 meshSize, vec2 imageSize, vec2 uv) {
      if (imageSize.x <= 0.0 || imageSize.y <= 0.0 ||
          meshSize.x  <= 0.0 || meshSize.y  <= 0.0) return uv;
      float meshRatio  = meshSize.x  / meshSize.y;
      float imageRatio = imageSize.x / imageSize.y;
      if (meshRatio > imageRatio) {
        return vec2(uv.x, (uv.y - 0.5) * (imageRatio / meshRatio) + 0.5);
      } else {
        return vec2((uv.x - 0.5) * (meshRatio / imageRatio) + 0.5, uv.y);
      }
    }

    void main() {
      vec2 uv = vUv;
      vec2 texUv = backgroundCoverUv(uMeshSize, uImageSize, uv);
      vec2 center = vec2(0.5);
      float dist = distance(uv, center);

      vec2 texelSize = vec2(1.0 / 64.0);
      float hL = texture2D(uDisplacementMap, uv - vec2(texelSize.x, 0.0)).r;
      float hR = texture2D(uDisplacementMap, uv + vec2(texelSize.x, 0.0)).r;
      float hT = texture2D(uDisplacementMap, uv - vec2(0.0, texelSize.y)).r;
      float hB = texture2D(uDisplacementMap, uv + vec2(0.0, texelSize.y)).r;
      vec2 mouseNormalOffset = vec2(hL - hR, hT - hB);

      float waveProgress  = smoothstep(0.0, 1.0, uProgress);
      float rippleRadius  = waveProgress;
      float waveIntensity = smoothstep(0.0, 0.2, uProgress) * smoothstep(1.0, 0.6, uProgress);

      float wavePattern      = sin((dist - rippleRadius) * 8.0) * waveIntensity * 0.15;
      vec2  waveNormalOffset = normalize(uv - center) * wavePattern;

      vec2 distortion = (mouseNormalOffset + waveNormalOffset) * uDistortionStrength;

      float rippleThickness = 0.15;
      float mask = smoothstep(rippleRadius - rippleThickness, rippleRadius, dist);

      float maskWave = sin((dist - rippleRadius) * 6.0) * 0.5 + 0.5;
      mask = mix(mask, mask * (1.0 - maskWave * 0.35), waveIntensity);
      mask = clamp(mask, 0.0, 1.0);

      vec4 tex1 = texture2D(uTexture,     texUv + distortion);
      vec4 tex2 = texture2D(uTextureNext, texUv + distortion);

      vec4 finalColor = mix(tex2, tex1, mask);

      vec2 totalNormal = mouseNormalOffset + waveNormalOffset;
      finalColor.rgb *= clamp(1.0 - length(totalNormal) * 0.6, 0.6, 1.0);
      finalColor.a   *= uOpacity;
      gl_FragColor    = finalColor;
    }
  `,
});
const dispMesh = new THREE.Mesh(geo, dispMat);
scene.add(dispMesh);

/* ---------- textures ---------- */
const loader = new THREE.TextureLoader();
const textures = PROJECTS.map(p => {
  const t = loader.load(p.src, (tex) => {
    tex.colorSpace = THREE.SRGBColorSpace;
    tex.minFilter  = THREE.LinearFilter;
    tex.magFilter  = THREE.LinearFilter;
    tex.generateMipmaps = false;
    p._w = tex.image?.naturalWidth  || 1920;
    p._h = tex.image?.naturalHeight || 1080;
  });
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
});

/* ---------- state ---------- */
let currentIdx = 0;
let nextIdx    = 0;
let transitionStart = -1;

dispMat.uniforms.uTexture.value     = textures[0];
dispMat.uniforms.uTextureNext.value = textures[0];

function setMeta(i) {
  const p = PROJECTS[i];
  /* keep one project line per data \n — set as textContent so pre-line works */
  document.getElementById('title').textContent = p.name;
  document.getElementById('info').innerHTML    = p.services.map(s => `<div>${s}</div>`).join('');
}
function setActiveRail(i) {
  railBtns.forEach((b, j) => b.classList.toggle('active', j === i));
  thumbBtns.forEach((b, j) => b.classList.toggle('active', j === i));
  moveThumbIndicator(i);
}
setMeta(0); setActiveRail(0);

function goTo(i) {
  if (i === currentIdx || transitionStart >= 0) return;
  nextIdx = i;
  dispMat.uniforms.uTextureNext.value = textures[i];
  transitionStart = performance.now() / 1000;
  setActiveRail(i);
  document.getElementById('title').style.opacity = '.4';
}

/* ---------- mouse over canvas ---------- */
const mouseUv = new THREE.Vector2(0.5, 0.5);
const lastUv  = new THREE.Vector2(0.5, 0.5);
let inside    = false;
let mouseSpeed = 0;

canvas.addEventListener('pointerenter', () => { inside = true;  });
canvas.addEventListener('pointerleave', () => { inside = false; mouseSpeed = 0; });
canvas.addEventListener('pointermove', (e) => {
  const r = canvas.getBoundingClientRect();
  mouseUv.set(
    (e.clientX - r.left) / r.width,
    1.0 - (e.clientY - r.top) / r.height
  );
});

/* ---------- wheel-driven advance ---------- */
let wheelAccum = 0;
let lastWheelTime = 0;
const WHEEL_THRESHOLD = 220;
window.addEventListener('wheel', (e) => {
  if (transitionStart >= 0) { wheelAccum = 0; return; }
  const now = performance.now();
  if (now - lastWheelTime > 350) wheelAccum = 0;
  lastWheelTime = now;
  wheelAccum += e.deltaY;
  if (wheelAccum >  WHEEL_THRESHOLD) { goTo((currentIdx + 1) % PROJECTS.length); wheelAccum = 0; }
  if (wheelAccum < -WHEEL_THRESHOLD) { goTo((currentIdx - 1 + PROJECTS.length) % PROJECTS.length); wheelAccum = 0; }
}, { passive: true });

/* touchscreen swipe */
let tStartY = 0;
window.addEventListener('touchstart', (e) => { tStartY = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchend',   (e) => {
  if (transitionStart >= 0) return;
  const dy = tStartY - (e.changedTouches[0]?.clientY ?? tStartY);
  if (dy >  50) goTo((currentIdx + 1) % PROJECTS.length);
  if (dy < -50) goTo((currentIdx - 1 + PROJECTS.length) % PROJECTS.length);
}, { passive: true });

/* keyboard fallback */
window.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo((currentIdx + 1) % PROJECTS.length);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo((currentIdx - 1 + PROJECTS.length) % PROJECTS.length);
});

/* ---------- resize ---------- */
function fit() {
  /* image: 4:3 aspect (matches live site's centerpiece, NOT 16:9),
     occupying most of .center height, capped so it doesn't fight the
     title on the left or the info column on the right */
  const center = document.querySelector('.center');
  const rect   = center.getBoundingClientRect();
  const maxW = rect.width  * 0.60;     /* image never wider than 60% of center column */
  const maxH = rect.height * 0.88;
  const ratio = 4 / 3;
  let h = maxH;
  let w = h * ratio;
  if (w > maxW) { w = maxW; h = w / ratio; }
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  renderer.setSize(w, h, false);
  dispMat.uniforms.uMeshSize.value.set(w, h);
  moveThumbIndicator(currentIdx);
}
window.addEventListener('resize', fit);
fit();

/* ---------- render loop ---------- */
const clock = new THREE.Clock();
let lastTime = 0;
function frame() {
  requestAnimationFrame(frame);
  const now = clock.getElapsedTime();
  const dt  = Math.min(now - lastTime, 1/30);
  lastTime  = now;

  const dx = mouseUv.x - lastUv.x;
  const dy = mouseUv.y - lastUv.y;
  const inst = Math.sqrt(dx*dx + dy*dy);
  mouseSpeed = mouseSpeed * 0.85 + inst * 0.15;
  lastUv.copy(mouseUv);

  simMat.uniforms.uMouse.value.copy(mouseUv);
  simMat.uniforms.uVelocity.value = inside ? Math.min(mouseSpeed * 14.0, 1.0) : 0;

  const p = PROJECTS[currentIdx];
  if (p._w) dispMat.uniforms.uImageSize.value.set(p._w, p._h);

  /* sim ping-pong */
  simMat.uniforms.uTexture.value = rtA.texture;
  renderer.setRenderTarget(rtB);
  renderer.render(simScene, simCam);
  const tmp = rtA; rtA = rtB; rtB = tmp;

  if (transitionStart >= 0) {
    const tt = (performance.now()/1000 - transitionStart) / TRANSITION_DUR;
    if (tt >= 1) {
      dispMat.uniforms.uProgress.value = 0;
      currentIdx = nextIdx;
      dispMat.uniforms.uTexture.value     = textures[currentIdx];
      dispMat.uniforms.uTextureNext.value = textures[currentIdx];
      transitionStart = -1;
      setMeta(currentIdx);
      document.getElementById('title').style.opacity = '1';
    } else {
      dispMat.uniforms.uProgress.value = tt;
    }
  }

  dispMat.uniforms.uDisplacementMap.value = rtA.texture;
  renderer.setRenderTarget(null);
  renderer.render(scene, camera);
}
frame();

/* cookie banner dismiss */
document.querySelectorAll('.cookie button').forEach(b => b.onclick = () => document.getElementById('cookie').style.display = 'none');
</script>
</body>
