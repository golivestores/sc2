<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OMR Hoodie Grid · sc2 effect</title>
<style>
/* --- Self-contained reproduction of OMR Beauty's `featured-products` block ---
   Original: https://omrbeauty.com/  ("OMR HOODIE" mid-page section)
   Behavior copied 1:1:
     - Header row: big uppercase "OMR HOODIE" title (left) + "View all" link
       with bottom border on hover-out (right) + 2 nav arrow buttons.
     - 3-column horizontal grid at desktop (≥38rem); single-column horizontal
       scroll-snap on mobile (75% width per card).
     - Each card holds TWO stacked images: the primary visible by default,
       and `.card__hover-media` revealed on hover (replaces it). Below the
       images: small uppercase "Apparel" type label, product title (linked),
       price.
     - Card link `:after` covers the entire card so the whole tile is clickable.

   Differences from original (documented):
     - Shopify CSS variables (--spacing-*, --color-*, --font-heading) resolved
       to fixed values matching the rendered site.
     - Theme custom font (commercial Shopify font) replaced with system sans
       fallback. Visually close — the type is uppercase + medium weight which
       reads fine in any sans.
     - Nav arrow buttons are hidden on the original at desktop until needed
       (only when content overflows). Here we keep them always visible since
       the demo has exactly 3 cards (no overflow); they show as decorative
       affordance and click-scroll the row anyway. */

* { box-sizing: border-box; }
:root {
  --color-text: #1a1a1a;
  --color-subdued: #999;
  --color-mid: #cfcfcf;
  --spacing-xxs: 4px;
  --spacing-xs: 8px;
  --spacing-s: 12px;
  --spacing-m: 20px;
  --spacing-l: 32px;
  --spacing-xl: 64px;
  --spacing-xxl: 96px;
  --font-heading: -apple-system, "Segoe UI", "Helvetica Neue", "Inter", Arial, sans-serif;
  --font-body: var(--font-heading);
}
html, body { margin: 0; padding: 0; }
body {
  background: #fff;
  color: var(--color-text);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.featured-products {
  padding: var(--spacing-l) var(--spacing-m) var(--spacing-xxl);
  max-width: 1600px;
  margin: 0 auto;
}
@media (min-width: 38rem) {
  .featured-products { padding-inline: var(--spacing-xl); }
}

.featured-products__header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: var(--spacing-m);
  margin-bottom: var(--spacing-m);
}

.featured-products__title {
  margin: 0;
  font-family: var(--font-heading);
  font-weight: 500;
  font-size: clamp(36px, 6vw, 64px);
  line-height: 1.05;
  letter-spacing: -0.01em;
  text-transform: uppercase;
}

.featured-products__controls {
  display: flex;
  align-items: center;
  gap: var(--spacing-l);
}

.featured-products__view-all-link {
  color: var(--color-text);
  text-decoration: none;
  font-size: 14px;
  border-bottom: 1px solid currentColor;
  padding-bottom: 2px;
  transition: border-color 0.2s ease-in-out;
}
.featured-products__view-all-link:hover { border-bottom-color: transparent; }

.featured-products__nav { display: flex; gap: var(--spacing-m); }
@media (max-width: 37.99rem) { .featured-products__nav { display: none; } }
.featured-products__nav-btn {
  width: 28px; height: 28px;
  display: inline-flex; align-items: center; justify-content: center;
  padding: 0; margin: 0; border: 0;
  background: transparent;
  cursor: pointer;
  color: var(--color-text);
  font-size: 28px;
  transition: opacity 0.2s ease-in-out;
}
.featured-products__nav-btn svg { width: 1em; height: 1em; fill: currentColor; }
.featured-products__nav-btn:hover { opacity: 0.6; }
.featured-products__nav-btn[aria-disabled],
.featured-products__nav-btn:disabled {
  color: var(--color-mid);
  pointer-events: none;
}

.featured-products__list {
  scrollbar-width: none;
  -ms-overflow-style: -ms-autohiding-scrollbar;
  overflow-y: hidden;
  overflow-x: auto;
  overscroll-behavior-x: contain;
  -webkit-overflow-scrolling: touch;
  margin: 0; padding: 0;
  list-style: none;
  display: grid;
  grid-auto-columns: 75%;
  grid-auto-flow: column;
  gap: var(--spacing-m);
  scroll-snap-type: x mandatory;
}
.featured-products__list::-webkit-scrollbar { display: none; width: 0; height: 0; }
@media (min-width: 38rem) {
  .featured-products__list {
    grid-auto-columns: calc((100% - var(--spacing-m) * 2) / 3);
  }
}

/* product card */
.card.card--product {
  position: relative;
  display: flex;
  flex-direction: column;
  scroll-snap-align: start;
}

/* media wrapper holds both images stacked. Without this, the hover image's
   `position: absolute; inset: 0` extended over the .card__content area below
   (covering the product title) — the bug the previous version had. Now it
   only covers its sibling base image. */
.card__media-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 1280 / 1589;
  border-radius: 4px;
  overflow: hidden;
  background: #f4f4f4;
}
.card__media {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
}
.card__hover-media { display: none; z-index: 1; }
@media (hover: hover) and (pointer: fine) {
  .card:hover .card__hover-media { display: block; }
}

.card__content {
  padding-top: var(--spacing-xs);
  padding-left: var(--spacing-xs);
  display: flex;
  flex-direction: column;
  gap: var(--spacing-xxs);
  position: relative;
}
.card__content > * { margin: 0; }

.card__type {
  font-family: var(--font-heading);
  font-size: 14px;
  line-height: 1.3;
  font-weight: 500;
  text-transform: lowercase;
  letter-spacing: 0;
  color: var(--color-text);
}

.card__title {
  font-family: var(--font-heading);
  font-size: 18px;
  line-height: 1.2;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0;
}

.card__link { color: inherit; text-decoration: none; position: static; }
.card__link::after {
  content: ""; position: absolute;
  top: 0; right: 0; bottom: 0; left: 0;
  z-index: 1;
}

.card__price { font-family: var(--font-body); font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<section class="featured-products">
  <header class="featured-products__header">
    <h2 class="featured-products__title">OMR Hoodie</h2>
    <div class="featured-products__controls">
      <a href="#" class="featured-products__view-all-link">View all</a>
      <div class="featured-products__nav">
        <button type="button" class="featured-products__nav-btn" aria-label="Previous products" data-nav="prev">
          <svg viewBox="0 0 100 100" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M47 80.2282L38.2787 89L0 50.5L38.2787 12L47 20.7718L23.9053 44H100V57H23.9053L47 80.2282Z" fill="currentColor"/></svg>
        </button>
        <button type="button" class="featured-products__nav-btn" aria-label="Next products" data-nav="next">
          <svg viewBox="0 0 100 100" fill="none"><path fill-rule="evenodd" clip-rule="evenodd" d="M53 80.2282L61.7213 89L100 50.5L61.7213 12L53 20.7718L76.0947 44H0V57H76.0947L53 80.2282Z" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </header>

  <div class="featured-products__list" data-track>
    <article class="card card--product">
      <div class="card__media-wrapper">
        <img class="card__media"               src="assets/hood-black.png"       alt="OMR Hoodie · Black" width="1280" height="1589" loading="lazy">
        <img class="card__media card__hover-media" src="assets/hood-black-hover.jpg" alt="" width="1280" height="1589" loading="lazy">
      </div>
      <div class="card__content">
        <div class="card__type">apparel</div>
        <h3 class="card__title"><a href="#" class="card__link">OMR Hoodie · Black</a></h3>
        <div class="card__price">€69,95</div>
      </div>
    </article>

    <article class="card card--product">
      <div class="card__media-wrapper">
        <img class="card__media"               src="assets/hood-beige.png"       alt="OMR Hoodie · Beige" width="1280" height="1589" loading="lazy">
        <img class="card__media card__hover-media" src="assets/hood-beige-hover.jpg" alt="" width="1280" height="1589" loading="lazy">
      </div>
      <div class="card__content">
        <div class="card__type">apparel</div>
        <h3 class="card__title"><a href="#" class="card__link">OMR Hoodie · Beige</a></h3>
        <div class="card__price">€69,95</div>
      </div>
    </article>

    <article class="card card--product">
      <div class="card__media-wrapper">
        <img class="card__media"               src="assets/hood-grey.jpg"       alt="OMR Hoodie · Grey" width="1280" height="1589" loading="lazy">
        <img class="card__media card__hover-media" src="assets/hood-grey-hover.jpg" alt="" width="1280" height="1589" loading="lazy">
      </div>
      <div class="card__content">
        <div class="card__type">apparel</div>
        <h3 class="card__title"><a href="#" class="card__link">OMR Hoodie · Grey</a></h3>
        <div class="card__price">€69,95</div>
      </div>
    </article>
  </div>
</section>

<script>
/* Slider arrow controls — scroll the .featured-products__list by one card width.
   Original Shopify theme uses a `data-scroll-nav` controller; we re-implement
   the click-scroll part in 6 lines. */
(function () {
  const track = document.querySelector('[data-track]');
  if (!track) return;
  const cardWidth = () => {
    const card = track.querySelector('.card');
    return card ? card.getBoundingClientRect().width + 20 /* gap */ : 400;
  };
  document.querySelector('[data-nav="prev"]').addEventListener('click', () => track.scrollBy({ left: -cardWidth(), behavior: 'smooth' }));
  document.querySelector('[data-nav="next"]').addEventListener('click', () => track.scrollBy({ left:  cardWidth(), behavior: 'smooth' }));
})();
</script>
</body>
</html>
