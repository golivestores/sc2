<title>Sun Metalon · Blurred-glow Hero · sc2 effect</title>

<!--
  1:1 reproduction of the homepage hero on https://sunmetalon.com/
  ("Turn your metal waste / into revenue" + Aluminum Puck + Sun Metalon
  wordmark). Source: designs/019-sunmetalon.

  The "lighting" everyone notices is faked with ONE element:
      <div class="glow"></div>
  styled as a 50vw x 25vh rect of half-opaque copper (#d9683366),
  pinned bottom-center, then blurred to a 158-px-radius halo:
      filter: blur(158px);
  Layered z-index:0 behind the puck PNG (z:4) and SVG wordmark — gives
  the impression of a copper light source glowing up from below the
  metal briquette. There is no canvas/video/3D — just a blurred div.

  Entry timeline (GSAP, ported 1:1 from the original Nuxt bundle):
    chars (Turn your metal waste / into revenue):
          opacity 0 -> 1, stagger .005, duration .75, cubic.inOut
    SVG  large-logo paths:
          opacity 0 -> 1, duration 1.25, cubic.inOut,
          stagger { each:.075, from:"end", axis:"x" }   @ "<30%"
    .glow:
          opacity 0 -> 1, duration 1.65, cubic.inOut    @ "SVG+=50%"
    graphic line (between left/right span):
          width 0 -> auto, flex 1, duration 1.25, cubic.inOut @ "SVG+=10%"
    figure (puck):
          opacity 0 -> 1, duration .35                  @ "<60%"
          scale  .98 -> 1, rotateZ 5 -> 0, duration .95, cubic.out @ "<"

  Scroll-linked: figure.rotateZ = clamp(-15, 15, scrollY * -0.01)
  (1 deg per 100 px of scroll, clamped to +/-15)
-->

<link rel="stylesheet" href="css/hero.css">
</head>
<body>

<section class="page-header homepage">

  <h1 class="sr-only">Turn your metal waste into revenue</h1>

  <div class="text white">
    <h5 class="pre-anim" id="h5">
      <span class="left">Turn your metal waste</span>
      <div class="graphic">
        <div class="line"></div>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 1L1 13" stroke="#3E3A33"></path>
          <path d="M1 1L13 13" stroke="#3E3A33"></path>
        </svg>
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 1L1 13" stroke="#3E3A33"></path>
          <path d="M1 1L13 13" stroke="#3E3A33"></path>
        </svg>
      </div>
      <span class="right">into revenue</span>
    </h5>
  </div>

  <figure class="landscape contain pre-anim" id="figure"
          style="--bg-color:#9d806a;--width:1020;--height:954;">
    <img src="images/aluminum-puck.png"

  <div class="glow pre-anim" id="glow"></div>
