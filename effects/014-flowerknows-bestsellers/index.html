<title>Flower Knows · Shop Our Bestsellers · sc2 effect</title>

<!--
  Self-contained reproduction of the "Shop Our Bestsellers" section from
  https://flowerknows.co/. The original is rendered by the third-party
  Shopify app **Moast** (TikTok-style video showcase carousel) which ships
  as an ES module bundle plus 23 lazy chunks. To preserve 1:1 behavior
  (lazy intersection-init, autoplay-on-visible, mute toggle, embla-carousel
  drag, fullscreen player on click), the entire bundle is bundled here
  under lib/ verbatim. The slide data (~21 videos, product handles, schema)
  is embedded inline below in <script class="data"> as on the live page.

  Thumbnail and video URLs in the data point at https://cdn.shopify.com/...
  and load over the network at runtime.
-->

<style>
/* ---- Shopify "Be Yours" theme tokens just enough for the wrapper title to
        match the original site's typography (Palatino-stack heading,
        full-width 140rem container, top/bottom padding controlled by the
        section's own CSS variables which the original injects inline). */
:root {
  --page-width: 140rem;
  --font-heading-family: Palatino, 'Palatino Linotype', 'Book Antiqua', serif;
  --font-heading-style: normal;
  --font-heading-weight: 400;
  --font-heading-scale: 1.0;
  --font-body-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol";
  --color-heading: 25, 25, 25;
  --color-foreground: 25, 25, 25;
  --color-background: 255, 255, 255;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: rgb(var(--color-background));
  color: rgb(var(--color-foreground));
  font-family: var(--font-body-family);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* The exact subset of theme rules the section markup leans on */
h1, h2, h3, h4, h5, .h0, .h1, .h2, .h3, .h4, .h5 {
  font-family: var(--font-heading-family);
  font-style: var(--font-heading-style);
  font-weight: var(--font-heading-weight);
  letter-spacing: calc(var(--font-heading-scale) * .06rem);
  color: rgb(var(--color-heading));
  line-height: calc(1 + .3 / max(1, var(--font-heading-scale)));
  margin: 0;
}
h1, .h1 { font-size: calc(var(--font-heading-scale) * 2.8rem); }
@media only screen and (min-width: 750px) {
  h1, .h1 { font-size: calc(var(--font-heading-scale) * 4rem); }
}

.page-width { max-width: var(--page-width); margin: 0 auto; padding: 0 1.5rem; }
@media screen and (min-width: 750px) { .page-width { padding: 0 5rem; } }
.page-width--full-width { max-width: 100%; padding: 0; }

.title-wrapper {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  margin-bottom: 3rem;
}
.title-wrapper.left { justify-content: flex-start; }
.title-wrapper .title { margin: 0; }

.section--padding {
  padding-top: var(--section-padding-top, 0);
  padding-bottom: var(--section-padding-bottom, 0);
}

/* Re-base rem so the original 1.5rem/3rem/etc. land at sane sizes
   without relying on theme's html { font-size: 62.5% } */
html { font-size: 62.5%; }

/* The site's <h2> ("Shop Our Bestsellers") is centered on the live page
   because of an additional title-wrapper rule that overrides .left for
   non-mobile viewports — replicate it. */
.title-wrapper:not(.title-wrapper--no-heading) {
  flex-direction: column;
  align-items: center;
  text-align: center;
}
</style>

<!-- The Moast widget reads window.Shopify.shop in connectedCallback to
     know which shop the carousel belongs to (then loads inline data via
     the embedded <script class="data"> below — it does NOT call back to
     a Shopify API as long as window.Moast.accesses is pre-set, also
     below). Without window.Shopify.shop the connectedCallback bails out
     early and the IntersectionObserver is never wired up, leaving the
     skeleton-slide hanging. We replicate the minimal Shopify global the
     live page sets at the very top of <head>. -->
<script>
  var Shopify = Shopify || {};
  Shopify.shop = "flowerknows.myshopify.com";
  Shopify.locale = "en";
  Shopify.currency = { active: "USD", rate: "1.0" };
  Shopify.country = "US";
  Shopify.routes = Shopify.routes || {};
  Shopify.routes.root = "/";
</script>

<!-- The Moast app then embeds two more scripts before the carousel mounts:
     1. window.Moast.{accesses,translations,widgetSettings} — settings the
        bundle reads on connectedCallback to skip the /apps/moast/api/...
        settings round-trip;
     2. The bundle <script type="module"> + 7 modulepreload links to warm
        the chunk cache.

     Both kept verbatim from the live page. Bundle path rewritten from the
     deep assets/cdn.shopify.com/.../moast-3-974/assets/ location to lib/
     so this effect block is fully self-contained (A.2). -->
</head>
